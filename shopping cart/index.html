<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <ul id="item-list">
            <li class="item"> 
                <p class="item-name">Item 1</p>
                <p class="price">R$ 59,90</p>
                <button class="add-cart">Adicionar ao Carrinho</button>
            </li>
             <li class="item"> 
                <p class="item-name">Item 2</p>
                <p class="price">R$ 79,90</p>
                <button class="add-cart">Adicionar ao Carrinho</button>
            </li>
             <li class="item"> 
                <p class="item-name">Item 3</p>
                <p class="price">R$ 19,90</p>
                <button class="add-cart">Adicionar ao Carrinho</button>
            </li>
             <li class="item"> 
                <p class="item-name">Item 4</p>
                <p class="price">R$ 119,90</p>
                <button class="add-cart">Adicionar ao Carrinho</button>
            </li>
             <li class="item"> 
                <p class="item-name">Item 1</p>
                <p class="price">R$ 39,90</p>
                <button class="add-cart">Adicionar ao Carrinho</button>
            </li>
             <li class="item"> 
                <p class="item-name">Item 1</p>
                <p class="price">R$ 99,90</p>
                <button class="add-cart">Adicionar ao Carrinho</button>
            </li>
        </ul>
    </div>
    <div id="cart">
        <h2>Cart List</h2>
        <ul id="cart-list">
        </ul>
        <h3 id="total">Total: R$ 0,00</h3>
    </div>
    <button id="show-cart">Ir para o carrinho</button>
    <script src="script.js"></script>
</body>
</html>
